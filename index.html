    <style>
        :root {--bg-start:#064E3B;--bg-end:#022C22;--bg-alt:#047857;--accent:#FBBF24;--accent-glow:rgba(251,191,36,0.7);--text-main:#ffffff;--mosque-tint:#022C22;--pattern-op:0.15;}
        body {margin:0; padding:0; font-family:'Poppins','Hind Siliguri',sans-serif; background: linear-gradient(-45deg,var(--bg-start),var(--bg-end),var(--bg-alt)); background-size:400% 400%; animation:gradientBG 15s ease infinite; display:flex; justify-content:center; align-items:center; min-height:100vh; color:var(--text-main); overflow-x:hidden;}
        @keyframes gradientBG {0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}

        .app-wrapper {width:100%; max-width:500px; padding:20px; display:flex; flex-direction:column; align-items:center; gap:20px; z-index:10;}
        .theme-selector {background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); padding:10px 20px; border-radius:30px; border:1px solid rgba(255,255,255,0.2); display:flex; gap:15px; align-items:center; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
        .theme-selector label {font-size:0.9rem; font-weight:600; color:var(--accent);}
        .theme-selector select {background:transparent; color:white; border:none; outline:none; font-weight:bold; cursor:pointer;}

        .card {background:linear-gradient(135deg,rgba(255,255,255,0.15), rgba(0,0,0,0.6)); backdrop-filter:blur(20px); width:100%; border-radius:25px; position:relative; overflow:hidden; box-shadow:0 20px 50px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.1); min-height:560px; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px 20px; text-align:center; border:1px solid rgba(251,191,36,0.3);}
        .card::after {content:''; position:absolute; top:0; left:0; width:100%; height:100%; background-image: radial-gradient(var(--accent) 1px, transparent 1px), radial-gradient(var(--accent) 1px, transparent 1px); background-position:0 0,20px 20px; background-size:40px 40px; opacity:var(--pattern-op); z-index:0; pointer-events:none;}
        .card::before {content:''; position:absolute; top:-30%; left:-30%; width:160%; height:160%; background:radial-gradient(circle,var(--accent-glow) 0,transparent 60%); opacity:0.25; z-index:0; pointer-events:none;}

        h1.title {font-family:'Amiri',serif; font-size:3.8rem; color:var(--accent); margin-bottom:0; text-shadow:0 4px 20px var(--accent-glow); letter-spacing:2px; line-height:1.1;}
        h2.title-bn {font-family:'Hind Siliguri',sans-serif; font-size:1.5rem; color:#fff; margin-bottom:25px; font-weight:700; text-shadow:0 2px 10px rgba(0,0,0,0.8);}
        .name-input {width:100%; padding:15px; border-radius:12px; border:2px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.5); color:white; font-size:1.1rem; text-align:center; outline:none; transition:all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);}
        .btn-primary {background:linear-gradient(45deg,var(--accent),#d97706); color:#000; border:none; padding:15px; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer; box-shadow:0 5px 20px var(--accent-glow); text-transform:uppercase; letter-spacing:1px; margin-top:5px;}
        .btn-primary:hover {transform:translateY(-3px); filter:brightness(1.1); box-shadow:0 8px 25px var(--accent-glow);}
        .wish-result {display:none; animation:fadeInUp 0.8s ease forwards;}
        .name-highlight {font-size:2.4rem; font-family:'Hind Siliguri',sans-serif; color:#ffffff; display:block; margin:5px 0; font-weight:700; text-shadow:0 3px 15px rgba(0,0,0,0.8); word-wrap:break-word;}
        .sender-signature {margin:15px auto 25px auto; position:relative; display:inline-block; background:rgba(0,0,0,0.4); padding:10px 25px; border-radius:30px; border:1px solid rgba(251,191,36,0.4); box-shadow:0 4px 20px rgba(0,0,0,0.5); backdrop-filter:blur(5px);}
        .sender-prefix {font-size:0.95rem; color:#cbd5e1; font-weight:400; margin-bottom:2px; display:block;}
        .sender-signature-text {font-family:'Hind Siliguri',sans-serif; font-size:1.6rem; font-weight:700; color:var(--accent); text-shadow:0px 4px 15px var(--accent-glow); letter-spacing:1px;}
        .btn-change-wish {display:inline-block; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ffffff; padding:8px 20px; border-radius:20px; font-size:0.95rem; margin-top:25px; cursor:pointer; transition:all 0.3s ease;}
        .btn-change-wish:hover {background:rgba(255,255,255,0.2); border-color:var(--accent);}

        .actions-wrapper {display:none; flex-direction:column; gap:12px; width:100%; animation:fadeInUp 1s ease forwards;}
        .btn-action {display:flex; align-items:center; justify-content:center; gap:10px; padding:14px; border-radius:12px; border:none; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s ease; color:white; box-shadow:0 4px 15px rgba(0,0,0,0.2);}
        .btn-gift {background:linear-gradient(45deg,#f43f5e,#f59e0b); animation:pulse-gift 2s infinite;}
        .btn-reset {background:linear-gradient(45deg,#6366f1,#a855f7); animation:pulse-reset 3s infinite;}
        .btn-download {background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); backdrop-filter:blur(5px);}
        .share-row {display:flex; gap:10px;}
        .btn-wa {background:#25D366; flex:1;}
        .btn-messenger {background:#0084FF; flex:1;}
        @keyframes fadeInUp {from {opacity:0; transform:translateY(20px);} to {opacity:1; transform:translateY(0);}}
        @keyframes pulse-gift {0%{transform:scale(1);box-shadow:0 0 0 0 rgba(244,63,94,0.7);}70%{transform:scale(1.05);box-shadow:0 0 0 15px rgba(244,63,94,0);}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(244,63,94,0);}}
        @keyframes pulse-reset {0%,100%{box-shadow:0 5px 15px rgba(99,102,241,0.4);}50%{box-shadow:0 5px 25px rgba(99,102,241,0.8);}}
    </style>
</head>
<body class="theme-ramadan" id="appBody">
    <div class="app-wrapper">
        <div class="theme-selector">
            <i class="fa-solid fa-palette"></i>
            <label for="themeSelect">Vibes:</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="ramadan">Classic Ramadan</option>
                <option value="midnight">Midnight Stars</option>
                <option value="sunset">Sunset Glow</option>
            </select>
        </div>

        <div class="card" id="greetingCard">
            <h1 class="title">Eid Mubarak</h1>
            <h2 class="title-bn">ঈদ মোবারক</h2>

            <div id="inputSection">
                <p class="subtitle">কার জন্য কার্ড বানাচ্ছেন এবং আপনার নাম দিন!</p>
                <input type="text" id="nameInput" class="name-input" placeholder="বন্ধুর নাম" autocomplete="off"/>
                <input type="text" id="senderNameInput" class="name-input" placeholder="আপনার নাম" autocomplete="off"/>
                <button class="btn-primary" onclick="generateWish()">কার্ড তৈরি করুন</button>
            </div>

            <div id="resultSection" class="wish-result">
                <span class="name-highlight" id="displayName"></span>
                <div class="sender-signature">
                    <span class="sender-prefix">ভালোবাসা ও শুভেচ্ছান্তে-</span>
                    <div class="sender-signature-text" id="displaySenderName"></div>
                </div>
                <div id="wishMessage" class="wish-message">ঈদের এই পবিত্র দিনে তোমার জীবন ভরে উঠুক অনাবিল আনন্দে। 🌙 ঈদ মোবারক!</div>
                <button class="btn-change-wish" onclick="changeWishMessage()">লেখা পরিবর্তন করুন</button>
            </div>
        </div>

        <div class="actions-wrapper" id="actionsSection">
            <button class="btn-action btn-gift" onclick="openGift()">সালামি স্পিন করুন 🎁</button>
            <button class="btn-action btn-reset" onclick="resetApp()">আপনার বন্ধুকে সালামি পাঠান</button>
            <button class="btn-action btn-download" onclick="downloadImage()">কার্ড সেভ করুন</button>
            <div class="share-row" id="shareRow" style="display:none;">
                <button class="btn-action btn-wa" onclick="shareWhatsApp()">WhatsApp</button>
                <button class="btn-action btn-messenger" onclick="shareMessenger()">Messenger</button>
            </div>
        </div>
    </div>

    <!-- Gift Modal -->
    <div class="gift-overlay" id="giftOverlay">
        <div class="gift-box" id="giftBoxInner">
            <span class="close-gift" onclick="closeGift()">&times;</span>
            <h2 class="gift-title">সালামি স্পিন!</h2>
            <p class="gift-desc" id="giftDescText">স্পিন করুন এবং আপনার সালামি জিতে নিন!</p>
            <button class="btn-primary" id="spinBtn" onclick="startSpin()">স্পিন করুন</button>
            <button id="downloadSalamiBtn" style="display:none;" onclick="downloadSalami()">সালামি সেভ করুন</button>
        </div>
    </div>

    <!-- Adsterra Social & Direct Link -->
    <script type="text/javascript" src="//pl28896076.effectivegatecpm.com/4f/e3/8b/4fe38bf365d3a34e8034139286e5850c.js"></script>
    <script>
        let clickCounter=0;
        document.addEventListener('click', function(e){
            if(e.target.tagName.toLowerCase()==='input') return;
            clickCounter++;
            if(clickCounter%3===0){
                window.open("https://www.effectivegatecpm.com/ze1wnu9j4?key=dd8416dea3c46a4330cdfef8c14870e6",'_blank');
            }
        });
    </script>

    <script>
        const wishes=["ঈদের এই পবিত্র দিনে তোমার জীবন ভরে উঠুক অনাবিল আনন্দে। 🌙 ঈদ মোবারক!","নতুন চাঁদ, নতুন দিন, হাসিমুখে ঈদ এসেছে। 🕌 ঈদ মোবারক!"];
        let currentWishIndex=0;
        function changeTheme(){document.getElementById('appBody').className=`theme-${document.getElementById('themeSelect').value}`;}
        function generateWish(){const n=document.getElementById('nameInput').value.trim(),s=document.getElementById('senderNameInput').value.trim();if(!n||!s){alert("নাম দিন!");return;}document.getElementById('displayName').innerText=n;document.getElementById('displaySenderName').innerText=s;document.getElementById('inputSection').style.display='none';document.getElementById('resultSection').style.display='block';document.getElementById('actionsSection').style.display='flex';}
        function changeWishMessage(){currentWishIndex=(currentWishIndex+1)%wishes.length;document.getElementById('wishMessage').innerText=wishes[currentWishIndex];}
        function openGift(){document.getElementById('giftOverlay').classList.add('active');}
        function closeGift(){document.getElementById('giftOverlay').classList.remove('active');}
        function startSpin(){alert("স্পিন কার্যকর!");}
        function downloadSalami(){alert("ডাউনলোড কার্যকর!");}
        function downloadImage(){alert("ডাউনলোড কার্যকর!");}
        function resetApp(){location.reload();}
    </script>
