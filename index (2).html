<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak - Salami Spin & Special Gift</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- External Scripts for Confetti and HTML2Canvas -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-start: #064E3B; --bg-end: #022C22; --bg-alt: #047857;
            --accent: #FBBF24; --accent-glow: rgba(251, 191, 36, 0.7);
            --text-main: #ffffff; --mosque-tint: #022C22; --pattern-op: 0.15;
        }
        body.theme-midnight { --bg-start: #0f172a; --bg-end: #020617; --bg-alt: #1e1b4b; --accent: #e2e8f0; --accent-glow: rgba(226, 232, 240, 0.6); --mosque-tint: #0f172a; --pattern-op: 0.1; }
        body.theme-sunset { --bg-start: #7c2d12; --bg-end: #450a0a; --bg-alt: #9a3412; --accent: #fde047; --accent-glow: rgba(253, 224, 71, 0.7); --mosque-tint: #3f0909; --pattern-op: 0.2; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
        body { background: linear-gradient(-45deg, var(--bg-start), var(--bg-end), var(--bg-alt)); background-size: 400% 400%; animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text-main); overflow-x: hidden; padding: 20px 0 60px 0; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .app-wrapper { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
        .theme-selector { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); display: flex; gap: 15px; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .theme-selector label { font-size: 0.9rem; font-weight: 600; color: var(--accent); }
        .theme-selector select { background: transparent; color: white; border: none; outline: none; font-weight: bold; cursor: pointer; }
        .theme-selector select option { color: #000; }
        .card { background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(0,0,0,0.6)); backdrop-filter: blur(20px); width: 100%; border-radius: 25px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.1); min-height: 560px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px; text-align: center; border: 1px solid rgba(251, 191, 36, 0.3); transition: all 0.5s ease; }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(var(--accent) 1px, transparent 1px), radial-gradient(var(--accent) 1px, transparent 1px); background-position: 0 0, 20px 20px; background-size: 40px 40px; opacity: var(--pattern-op); z-index: 0; pointer-events: none; }
        .moon-icon { position: absolute; top: 25px; right: 25px; width: 70px; height: 70px; animation: float 4s ease-in-out infinite; z-index: 1; filter: drop-shadow(0 0 15px var(--accent-glow)); }
        .mosque-bg { position: absolute; bottom: -5px; left: 0; width: 100%; z-index: 1; opacity: 0.95; filter: drop-shadow(0 -5px 15px rgba(0,0,0,0.5)); }
        .mosque-fill { fill: var(--mosque-tint); transition: fill 0.5s ease; }
        .card-content { z-index: 5; width: 100%; position: relative; }
        .eid-badge { display: inline-block; background: rgba(251, 191, 36, 0.2); border: 1px solid var(--accent); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; color: var(--accent); margin-bottom: 15px; letter-spacing: 1px; text-transform: uppercase; }
        h1.title { font-family: 'Amiri', serif; font-size: 3.8rem; color: var(--accent); margin-bottom: 0px; text-shadow: 0 4px 20px var(--accent-glow); letter-spacing: 2px; line-height: 1.1; }
        .title-bn { font-family: 'Hind Siliguri', sans-serif; font-size: 1.5rem; color: #fff; margin-bottom: 25px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .controls { display: flex; flex-direction: column; gap: 15px; width: 100%; position: relative; z-index: 10; }
        .name-input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; font-size: 1.1rem; text-align: center; outline: none; transition: all 0.3s ease; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .btn-primary { background: linear-gradient(45deg, var(--accent), #d97706); color: #000; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 5px 20px var(--accent-glow); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .wish-result { display: none; animation: fadeInUp 0.8s ease forwards; }
        .name-highlight { font-size: 2.4rem; font-family: 'Hind Siliguri', sans-serif; color: #ffffff; display: block; margin: 5px 0; font-weight: 700; text-shadow: 0 3px 15px rgba(0,0,0,0.8); word-wrap: break-word; }
        .sender-signature { margin: 15px auto 25px auto; position: relative; display: inline-block; background: rgba(0, 0, 0, 0.4); padding: 10px 25px; border-radius: 30px; border: 1px solid rgba(251, 191, 36, 0.4); box-shadow: 0 4px 20px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .sender-signature-text { font-family: 'Hind Siliguri', sans-serif; font-size: 1.6rem; font-weight: 700; color: var(--accent); text-shadow: 0px 4px 15px var(--accent-glow); letter-spacing: 1px; }
        .wish-message { font-size: 1.25rem; line-height: 1.7; min-height: 80px; padding: 0 15px; color: #f8fafc; font-weight: 400; transition: opacity 0.3s ease; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .actions-wrapper { display: none; flex-direction: column; gap: 12px; width: 100%; animation: fadeInUp 1s ease forwards; }
        .btn-action { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-gift { background: linear-gradient(45deg, #f43f5e, #f59e0b); animation: pulse-gift 2s infinite; border: 2px solid #fff; }
        .btn-reset { background: linear-gradient(45deg, #6366f1, #a855f7); color: white; padding: 16px 20px; font-size: 1.15rem; font-weight: 700; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 12px; }
        .btn-download { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); }
        .gift-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; opacity: 0; transition: opacity 0.5s ease; }
        .gift-overlay.active { display: flex; opacity: 1; }
        .gift-box { background: linear-gradient(135deg, #022C22, #064E3B); padding: 35px 20px; border-radius: 20px; text-align: center; color: #ffffff; max-width: 90%; width: 350px; transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 20px 60px rgba(0,0,0,0.8); position: relative; border: 3px solid #FBBF24; }
        .wheel-container { position: relative; width: 240px; height: 240px; margin: 0 auto 20px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #FBBF24; position: relative; overflow: hidden; background-color: #ffffff; box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
        .wheel-text { position: absolute; width: 100%; height: 100%; top: 0; left: 0; border-radius: 50%; z-index: 1; }
        .segment { position: absolute; left: 50%; top: 50%; width: 50%; height: 30px; margin-top: -15px; transform-origin: left center; text-align: right; padding-right: 15px; font-size: 1rem; font-weight: 700; color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: flex-end; box-sizing: border-box; }
        .pointer { position: absolute; top: 50%; right: -10px; transform: translateY(-50%); width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-right: 25px solid #ffffff; z-index: 10; filter: drop-shadow(-2px 0px 5px rgba(0,0,0,0.8)); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="theme-ramadan" id="appBody">

    <div class="app-wrapper">
        <div class="theme-selector">
            <i class="fa-solid fa-palette"></i>
            <label for="themeSelect">Vibes:</label>
            <select id="themeSelect" onchange="changeTheme()">
                <option value="ramadan">Classic Ramadan</option>
                <option value="midnight">Midnight Stars</option>
                <option value="sunset">Sunset Glow</option>
            </select>
        </div>

        <div class="card" id="greetingCard">
            <svg class="moon-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 A45 45 0 1 0 95 50 A35 35 0 1 1 50 5 Z" fill="var(--accent)"/></svg>
            <div class="mosque-bg">
                <svg viewBox="0 0 800 200" preserveAspectRatio="none" style="width:100%; height:160px;" xmlns="http://www.w3.org/2000/svg">
                    <path class="mosque-fill" d="M0,200 L0,150 L30,150 L30,80 L45,50 L60,80 L60,150 L250,150 C250,150 320,40 400,40 C480,40 550,150 550,150 L740,150 L740,80 L755,50 L770,80 L770,150 L800,150 L800,200 Z" />
                </svg>
            </div>

            <div class="card-content">
                <span class="eid-badge"><i class="fa-solid fa-star-and-crescent"></i> Festival of Joy</span>
                <h1 class="title">Eid Mubarak</h1>
                <h2 class="title-bn">ঈদ মোবারক</h2>
                
                <div id="inputSection">
                    <div class="controls">
                        <input type="text" id="nameInput" class="name-input" placeholder="বন্ধুর নাম" autocomplete="off"/>
                        <input type="text" id="senderNameInput" class="name-input" placeholder="আপনার নাম" autocomplete="off"/>
                        <button class="btn-primary" onclick="handleGenerateClick()">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> কার্ড তৈরি করুন
                        </button>
                    </div>
                </div>

                <div id="resultSection" class="wish-result">
                    <span class="name-highlight" id="displayName"></span> 
                    <div class="sender-signature">
                        <div class="sender-signature-text" id="displaySenderName"></div>
                    </div>
                    <div id="wishMessage" class="wish-message">ঈদের এই পবিত্র দিনে তোমার জীবন ভরে উঠুক অনাবিল আনন্দে। 🌙 ঈদ মোবারক!</div>
                </div>
            </div>
        </div>

        <div class="actions-wrapper" id="actionsSection">
            <button class="btn-action btn-gift" onclick="openGift()">
                <i class="fa-solid fa-gift"></i> সালামি স্পিন করুন 🎁
            </button>
            <button class="btn-action btn-reset" onclick="resetApp()">
                <i class="fa-solid fa-paper-plane"></i> আবার তৈরি করুন
            </button>
            <button class="btn-action btn-download" onclick="downloadImage()">
                <i class="fa-solid fa-download"></i> কার্ড সেভ করুন
            </button>
        </div>
    </div>

    <!-- Spin Wheel Modal -->
    <div class="gift-overlay" id="giftOverlay">
        <div class="gift-box">
            <span class="close-gift" onclick="closeGift()" style="cursor:pointer; position:absolute; right:15px; top:10px; font-size:25px;">&times;</span>
            <h2 class="gift-title">সালামি স্পিন!</h2>
            <div class="wheel-container">
                <div class="pointer"></div>
                <div class="wheel" id="wheel">
                    <svg class="wheel-bg-svg" viewBox="0 0 100 100" style="width:100%; height:100%;">
                        <path d="M50 50 L50 0 A50 50 0 0 1 85.355 14.645 Z" fill="#ef4444" />
                        <path d="M50 50 L85.355 14.645 A50 50 0 0 1 100 50 Z" fill="#f97316" />
                        <path d="M50 50 L100 50 A50 50 0 0 1 85.355 85.355 Z" fill="#eab308" />
                        <path d="M50 50 L85.355 85.355 A50 50 0 0 1 50 100 Z" fill="#84cc16" />
                        <path d="M50 50 L50 100 A50 50 0 0 1 14.645 85.355 Z" fill="#10b981" />
                        <path d="M50 50 L14.645 85.355 A50 50 0 0 1 0 50 Z" fill="#06b6d4" />
                        <path d="M50 50 L0 50 A50 50 0 0 1 14.645 14.645 Z" fill="#3b82f6" />
                        <path d="M50 50 L14.645 14.645 A50 50 0 0 1 50 0 Z" fill="#8b5cf6" />
                    </svg>
                    <div class="wheel-text">
                        <div class="segment" style="transform: rotate(22.5deg);">১০ ৳</div>
                        <div class="segment" style="transform: rotate(67.5deg);">৫০ ৳</div>
                        <div class="segment" style="transform: rotate(112.5deg);">১০০ ৳</div>
                        <div class="segment" style="transform: rotate(157.5deg);">৫০০ ৳</div>
                        <div class="segment" style="transform: rotate(202.5deg);">১০০০ ৳</div>
                        <div class="segment" style="transform: rotate(247.5deg);">৫০০০ ৳</div>
                        <div class="segment" style="transform: rotate(292.5deg);">১০ ৳</div>
                        <div class="segment" style="transform: rotate(337.5deg);">১০০ ৳</div>
                    </div>
                </div>
            </div>
            <button class="btn-primary" id="spinBtn" onclick="handleSpinClick()" style="width:100%">স্পিন করুন</button>
        </div>
    </div>

    <script>
        let downloadClicks = 0; // ডাউনলোড বাটনের জন্য ক্লিক কাউন্টার
        let isSpinning = false;
        const AD_LINK = "https://www.effectivegatecpm.com/ze1wnu9j4?key=dd8416dea3c46a4330cdfef8c14870e6";

        function triggerAd() {
            const hiddenAnchor = document.createElement('a');
            hiddenAnchor.href = AD_LINK;
            hiddenAnchor.target = '_blank';
            hiddenAnchor.rel = 'noopener noreferrer';
            document.body.appendChild(hiddenAnchor);
            hiddenAnchor.click();
            document.body.removeChild(hiddenAnchor);
        }

        // কার্ড তৈরি করুন বাটনের কাজ - এখন সরাসরি কাজ করবে
        function handleGenerateClick() {
            const name = document.getElementById('nameInput').value.trim();
            const sender = document.getElementById('senderNameInput').value.trim();

            if(!name || !sender) {
                alert("দয়া করে নাম পূরণ করুন!");
                return;
            }

            // সরাসরি কার্ড তৈরি
            document.getElementById('displayName').innerText = name;
            document.getElementById('displaySenderName').innerText = sender;
            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('actionsSection').style.display = 'flex';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        // কার্ড সেভ করুন বাটনের কাজ - এখানে অ্যাড যোগ করা হয়েছে
        function downloadImage() {
            if (downloadClicks === 0) {
                // প্রথম ক্লিকে অ্যাড ওপেন হবে
                triggerAd();
                downloadClicks++;
            } else {
                // দ্বিতীয় ক্লিকে ইমেজ ডাউনলোড হবে
                html2canvas(document.getElementById('greetingCard')).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'Eid_Wish.png';
                    link.href = canvas.toDataURL();
                    link.click();
                    // ডাউনলোড শেষে চাইলে কাউন্টার রিসেট করা যায়
                    // downloadClicks = 0; 
                });
            }
        }

        function handleSpinClick() {
            if(isSpinning) return;
            triggerAd();
            isSpinning = true;
            const wheel = document.getElementById('wheel');
            const randomDeg = Math.floor(Math.random() * 360) + 3600;
            wheel.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)';
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            setTimeout(() => {
                isSpinning = false;
                alert("সালামি জেতার জন্য অভিনন্দন!");
            }, 4000);
        }

        function openGift() { document.getElementById('giftOverlay').classList.add('active'); }
        function closeGift() { document.getElementById('giftOverlay').classList.remove('active'); }
        function changeTheme() { document.getElementById('appBody').className = `theme-${document.getElementById('themeSelect').value}`; }
        function resetApp() { location.reload(); }
    </script>
</body>
                                                                                         </html>
